services:
  email-parser-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-parser-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 20

  ngrok:
    image: ngrok/ngrok:latest
    container_name: email-parser-ngrok
    restart: unless-stopped
    depends_on:
      email-parser-api:
        condition: service_healthy
    environment:
      - NGROK_AUTHTOKEN=3Gcyx0tHQUUdvifwjpawtYsYknH_2ntKu9sMydP4ouZyNyc5L
    command: http email-parser-api:8000 --log=stdout
    ports:
      - "4040:4040"

volumes: {}